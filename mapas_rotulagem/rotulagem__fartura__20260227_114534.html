<script>
(function(){
  const STORAGE_KEY = "quadrify_rotulagem__rotulagem__fartura";
  const GEO_NAME = "geo_json_89b8e12f85ca28d6a788f4e8db43504f";

  const COLORS = {
    "BASE":      {fill:"#6a3d9a", stroke:"#111111"},
    "POTENCIAL": {fill:"#2ca25f", stroke:"#111111"},
    "NEUTRO":    {fill:"#808080", stroke:"#111111"},
    "RUIM":      {fill:"#d73027", stroke:"#111111"},
    "NONE":      {fill:"#bdbdbd", stroke:"#111111"}
  };

  function loadState(){
    try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? (JSON.parse(raw) || {}) : {}; }
    catch(e){ return {}; }
  }
  function saveState(obj){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(obj || {})); } catch(e){}
  }
  function styleForLabel(lbl){
    const c = COLORS[lbl] || COLORS["NONE"];
    return {fillColor:c.fill, color:c.stroke, weight:1.7, fillOpacity:0.80, opacity:0.98};
  }
  function getByEval(name){
    try { return eval(name); } catch(e) { return null; }
  }

  function boot(){
    const GEO = getByEval(GEO_NAME);
    if(!GEO){ setTimeout(boot, 200); return; }

    const st0 = loadState();
    GEO.eachLayer((layer)=>{
      try{
        const props = (layer.feature && layer.feature.properties) ? layer.feature.properties : {};
        const fid = props && props._qid ? String(props._qid) : null;
        const lbl = (fid && st0[fid]) ? st0[fid] : "NONE";
        layer.setStyle(styleForLabel(lbl));
      }catch(e){}
    });

    GEO.eachLayer((layer)=>{
      layer.on("click", (e)=>{
        try{
          const props = (layer.feature && layer.feature.properties) ? layer.feature.properties : {};
          const fid = props && props._qid ? String(props._qid) : null;
          if(!fid) return;

          const st = loadState();
          const atual = (st[fid] ? st[fid] : "NONE");

          const msg =
            "Rotular setor " + fid + "\\n" +
            "Municipio: " + (props._mun || "") + "\\n\\n" +
            "Atual: " + atual + "\\n\\n" +
            "Digite: 1=BASE, 2=POTENCIAL, 3=NEUTRO, 4=RUIM, 0=REMOVER\\n" +
            "(Cancelar = não muda)";
          const resp = prompt(msg, "");
          if(resp === null) return;

          let novo = null;
          const r = String(resp).trim();
          if(r === "1") novo = "BASE";
          else if(r === "2") novo = "POTENCIAL";
          else if(r === "3") novo = "NEUTRO";
          else if(r === "4") novo = "RUIM";
          else if(r === "0") novo = "NONE";
          else { alert("Entrada inválida. Use 1,2,3,4 ou 0."); return; }

          if(novo === "NONE") delete st[fid];
          else st[fid] = novo;
          saveState(st);

          layer.setStyle(styleForLabel(novo));

          const html =
            "<div style='font-family:Arial; font-size:12px;'>" +
              "<b>CD_setor:</b> " + fid + "<br>" +
              "<b>Municipio:</b> " + (props._mun || "") + "<br>" +
              "<b>Rotulo:</b> " + (novo === "NONE" ? "—" : novo) +
            "</div>";

          layer.bindPopup(html, {maxWidth: 320}).openPopup();

        }catch(err){}
      });

      layer.on("mouseover", ()=>{ try{ layer.setStyle({weight:2.4, fillOpacity:0.86}); }catch(e){} });
      layer.on("mouseout", ()=>{
        try{
          const props = (layer.feature && layer.feature.properties) ? layer.feature.properties : {};
          const fid = props && props._qid ? String(props._qid) : null;
          const st = loadState();
          const lbl = (fid && st[fid]) ? st[fid] : "NONE";
          layer.setStyle(styleForLabel(lbl));
        }catch(e){}
      });
    });
  }

  boot();
})();
</script>
