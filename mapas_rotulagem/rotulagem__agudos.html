<script>
(function(){
  const STORAGE_KEY="quadrify_rotulagem__rotulagem__agudos";

  const COLORS={
    "BASE":{fill:"#6a3d9a",stroke:"#111111"},
    "POTENCIAL":{fill:"#2ca25f",stroke:"#111111"},
    "NEUTRO":{fill:"#808080",stroke:"#111111"},
    "RUIM":{fill:"#d73027",stroke:"#111111"},
    "NONE":{fill:"#bdbdbd",stroke:"#111111"}
  };

  function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);return raw?JSON.parse(raw)||{}:{}}catch(e){return {}}}
  function saveState(obj){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(obj||{}))}catch(e){}}

  function styleForLabel(lbl){
    const c=COLORS[lbl]||COLORS["NONE"];
    return {fillColor:c.fill,color:c.stroke,weight:1.6,fillOpacity:.78,opacity:.95};
  }

  // >>> pega o layer certo DIRETO (sem varrer!)
  const GEO = window["geo_json_849a275795103eec964ad919e8a03e58"];

  function applyAll(){
    const st=loadState();
    GEO.eachLayer((layer)=>{
      try{
        const fid=(layer.feature&&layer.feature.properties&&layer.feature.properties._qid)?String(layer.feature.properties._qid):null;
        const lbl=(fid&&st[fid])?st[fid]:"NONE";
        layer.setStyle(styleForLabel(lbl));
      }catch(e){}
    });
  }

  // menu
  const menu=document.getElementById("qrfyMenu");
  let currentId=null;
  let currentLayer=null;

  function showMenuAt(x,y,fid){
    currentId=fid;
    const title=document.getElementById("qrfyMenuId");
    if(title) title.innerText=fid?fid:"";
    const hint=document.getElementById("qrfyHint");
    const st=loadState();
    const cur=(fid&&st[fid])?st[fid]:"—";
    if(hint) hint.innerHTML="Atual: <b>"+cur+"</b>";

    menu.style.left=(x+10)+"px";
    menu.style.top=(y+10)+"px";
    menu.style.display="block";
  }

  window.qrfyHideMenu=function(){menu.style.display="none";currentId=null;currentLayer=null;}

  window.qrfySet=function(lbl){
    if(!currentId) return;
    const st=loadState();
    st[String(currentId)]=lbl;
    saveState(st);
    if(currentLayer) currentLayer.setStyle(styleForLabel(lbl));
    window.qrfyHideMenu();
  }

  window.qrfyUnset=function(){
    if(!currentId) return;
    const st=loadState();
    delete st[String(currentId)];
    saveState(st);
    if(currentLayer) currentLayer.setStyle(styleForLabel("NONE"));
    window.qrfyHideMenu();
  }

  // fecha clicando fora
  document.addEventListener("click",(ev)=>{
    if(menu.style.display!=="block") return;
    if(!menu.contains(ev.target)) window.qrfyHideMenu();
  });

  // hook cliques
  GEO.eachLayer((layer)=>{
    layer.on("click",(e)=>{
      try{
        const fid=(layer.feature&&layer.feature.properties&&layer.feature.properties._qid)?String(layer.feature.properties._qid):null;
        if(!fid) return;
        currentLayer=layer;

        const evt=e.originalEvent;
        showMenuAt(evt.clientX,evt.clientY,fid);
      }catch(err){}
    });

    layer.on("mouseover",()=>{ try{ layer.setStyle({weight:2.4,fillOpacity:.86}); }catch(e){} });
    layer.on("mouseout",()=>{
      try{
        const st=loadState();
        const fid=(layer.feature&&layer.feature.properties&&layer.feature.properties._qid)?String(layer.feature.properties._qid):null;
        const lbl=(fid&&st[fid])?st[fid]:"NONE";
        layer.setStyle(styleForLabel(lbl));
      }catch(e){}
    });
  });

  applyAll();
})();
</script>
