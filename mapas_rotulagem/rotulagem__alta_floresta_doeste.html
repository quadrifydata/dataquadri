<div id="qrfyToast" class="qrfy-toast"></div>

<script>
(function(){
  const STORAGE_KEY = "quadrify_rotulagem__rotulagem__alta_floresta_doeste";

  const COLORS = {
    "BASE":      {"fill":"#6a3d9a", "stroke":"#111111"},
    "POTENCIAL": {"fill":"#2ca25f",  "stroke":"#111111"},
    "NEUTRO":    {"fill":"#808080",  "stroke":"#111111"},
    "RUIM":      {"fill":"#d73027", "stroke":"#111111"},
    "NONE":      {"fill":"#bdbdbd", "stroke":"#111111"}
  };

  function toast(msg){
    const el = document.getElementById("qrfyToast");
    el.innerText = msg;
    el.style.display = "block";
    clearTimeout(window.__qrfy_to);
    window.__qrfy_to = setTimeout(()=>{ el.style.display="none"; }, 2500);
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return {};
      const obj = JSON.parse(raw);
      if(obj && typeof obj === "object") return obj;
      return {};
    }catch(e){
      return {};
    }
  }

  function saveState(obj){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(obj || {})); }catch(e){}
  }

  function setCount(){
    const s = loadState();
    const n = Object.keys(s || {}).length;
    const el = document.getElementById("qrfyCount");
    if(el) el.innerText = String(n);
  }

  function findGeoJsonLayer(){
    try{
      const maps = [];
      for (const k in window){
        if(window[k] && window[k] instanceof L.Map){
          maps.push(window[k]);
        }
      }
      if(!maps.length) return null;
      const map = maps[0];

      let geo = null;
      map.eachLayer((layer)=>{
        if(layer && layer instanceof L.GeoJSON && !geo){
          geo = layer;
        }
      });
      return geo;
    }catch(e){
      return null;
    }
  }

  function styleForLabel(lbl){
    const c = COLORS[lbl] || COLORS["NONE"];
    return {
      fillColor: c.fill,
      color: c.stroke,
      weight: 1.6,
      fillOpacity: 0.78,
      opacity: 0.95
    };
  }

  function applyAll(){
    const geo = findGeoJsonLayer();
    if(!geo){
      setTimeout(applyAll, 600);
      return;
    }
    const state = loadState();
    geo.eachLayer((layer)=>{
      try{
        const fid = (layer.feature && layer.feature.properties && layer.feature.properties._qid)
          ? String(layer.feature.properties._qid) : null;
        const lbl = fid && state[fid] ? state[fid] : "NONE";
        layer.setStyle(styleForLabel(lbl));
      }catch(e){}
    });
    setCount();
  }

  const menu = document.getElementById("qrfyMenu");
  let currentId = null;
  let currentLayer = null;

  function showMenuAt(x,y, fid){
    currentId = fid;
    const title = document.getElementById("qrfyMenuId");
    if(title) title.innerText = fid ? ("#" + fid) : "";
    const hint = document.getElementById("qrfyHint");
    const st = loadState();
    const cur = fid && st[fid] ? st[fid] : "—";
    if(hint) hint.innerHTML = "Atual: <b>" + cur + "</b>";

    menu.style.left = (x + 10) + "px";
    menu.style.top  = (y + 10) + "px";
    menu.style.display = "block";
  }

  window.qrfyHideMenu = function(){
    menu.style.display = "none";
    currentId = null;
    currentLayer = null;
  }

  window.qrfySet = function(lbl){
    if(!currentId) return;
    const st = loadState();
    st[String(currentId)] = lbl;
    saveState(st);
    if(currentLayer){ currentLayer.setStyle(styleForLabel(lbl)); }
    setCount();
    toast("Marcado " + lbl + " em #" + currentId);
    window.qrfyHideMenu();
  }

  window.qrfyUnset = function(){
    if(!currentId) return;
    const st = loadState();
    delete st[String(currentId)];
    saveState(st);
    if(currentLayer){ currentLayer.setStyle(styleForLabel("NONE")); }
    setCount();
    toast("Removida marcação de #" + currentId);
    window.qrfyHideMenu();
  }

  window.qrfyClear = function(){
    const ok = confirm("Limpar TODAS as marcações deste mapa (no seu computador)?");
    if(!ok) return;
    saveState({});
    applyAll();
    toast("Marcações limpas.");
  }

  window.qrfyExport = function(){
    const st = loadState();
    const blob = new Blob([JSON.stringify(st, null, 2)], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (STORAGE_KEY + ".json");
    document.body.appendChild(a);
    a.click();
    a.remove();
    toast("Exportado JSON.");
  }

  window.qrfyImport = function(){
    const inp = document.createElement("input");
    inp.type = "file";
    inp.accept = ".json,application/json";
    inp.onchange = (ev)=>{
      const file = ev.target.files && ev.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        try{
          const obj = JSON.parse(reader.result);
          if(!obj || typeof obj !== "object") throw new Error("JSON inválido");
          saveState(obj);
          applyAll();
          toast("Importado JSON.");
        }catch(e){
          alert("Falha ao importar: " + e.message);
        }
      };
      reader.readAsText(file);
    };
    inp.click();
  }

  document.addEventListener("click", (ev)=>{
    if(!menu) return;
    if(menu.style.display !== "block") return;
    const inside = menu.contains(ev.target);
    if(!inside){ window.qrfyHideMenu(); }
  });

  function hookClicks(){
    const geo = findGeoJsonLayer();
    if(!geo){
      setTimeout(hookClicks, 600);
      return;
    }

    geo.eachLayer((layer)=>{
      if(layer.__qrfy_hooked) return;
      layer.__qrfy_hooked = true;

      layer.on("click", (e)=>{
        try{
          const fid = (layer.feature && layer.feature.properties && layer.feature.properties._qid)
            ? String(layer.feature.properties._qid) : null;
          if(!fid) return;

          currentLayer = layer;
          const evt = e.originalEvent;
          showMenuAt(evt.clientX, evt.clientY, fid);
        }catch(err){}
      });

      layer.on("mouseover", ()=>{ try{ layer.setStyle({weight: 2.4, fillOpacity: 0.86}); }catch(e){} });
      layer.on("mouseout", ()=>{
        try{
          const st = loadState();
          const fid = (layer.feature && layer.feature.properties && layer.feature.properties._qid)
            ? String(layer.feature.properties._qid) : null;
          const lbl = fid && st[fid] ? st[fid] : "NONE";
          layer.setStyle(styleForLabel(lbl));
        }catch(e){}
      });
    });

    applyAll();
  }

  hookClicks();
})();
</script>
</body>
