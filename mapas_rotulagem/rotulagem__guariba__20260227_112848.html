<style>
  .qrfy-menu{
    position:fixed; z-index:100000;
    background:rgba(18,18,18,.92);
    color:#fff;
    padding:10px 10px;
    border-radius:14px;
    font-family:Arial, sans-serif;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    display:none;
    min-width:280px;
    backdrop-filter: blur(10px);
    pointer-events: auto;
  }
  .qrfy-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px}
  .qrfy-btn{
    border:0; padding:8px 10px; border-radius:10px; cursor:pointer;
    font-weight:800; font-size:12px; color:#fff;
  }
  .qrfy-btn:hover{ filter:brightness(1.07); }
  .qrfy-mini{font-size:11px; opacity:.85; line-height:1.2}
  .qrfy-b{font-weight:900}
</style>

<script>
(function(){
  const STORAGE_KEY="quadrify_rotulagem__rotulagem__guariba";
  const MAP_NAME="map_54a4c75045784b4fe5516382220efd4d";
  const GEO_NAME="geo_json_c0d1fe64749d4d7f31afdb7035df6c8e";

  const COLORS={
    "BASE":{fill:"#6a3d9a",stroke:"#111111"},
    "POTENCIAL":{fill:"#2ca25f",stroke:"#111111"},
    "NEUTRO":{fill:"#808080",stroke:"#111111"},
    "RUIM":{fill:"#d73027",stroke:"#111111"},
    "NONE":{fill:"#bdbdbd",stroke:"#111111"}
  };

  function loadState(){ try{ const raw=localStorage.getItem(STORAGE_KEY); return raw? (JSON.parse(raw)||{}) : {}; }catch(e){ return {}; } }
  function saveState(obj){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(obj||{})); }catch(e){} }

  function styleForLabel(lbl){
    const c = COLORS[lbl] || COLORS["NONE"];
    return {fillColor:c.fill, color:c.stroke, weight:1.7, fillOpacity:.80, opacity:.98};
  }

  function getByEval(name){ try { return eval(name); } catch(e) { return null; } }

  function findGeoJsonFromMap(map){
    let found=null;
    try{
      map.eachLayer((layer)=>{
        if(found) return;
        if(layer && (layer instanceof L.GeoJSON)) found = layer;
      });
    }catch(e){}
    return found;
  }

  function findAnyMapAndGeo(){
    try{
      for(const k in window){
        const obj = window[k];
        if(obj && obj instanceof L.Map){
          const geo = findGeoJsonFromMap(obj);
          if(geo) return {map: obj, geo: geo};
        }
      }
    }catch(e){}
    return {map:null, geo:null};
  }

  // cria menu dinamicamente
  function ensureMenu(){
    let menu=document.getElementById("qrfyMenu");
    if(menu) return menu;

    menu=document.createElement("div");
    menu.id="qrfyMenu";
    menu.className="qrfy-menu";
    menu.innerHTML = `
      <div style="font-weight:900; margin-bottom:8px;">
        Setor: <span id="qrfyMenuId" style="opacity:.9;"></span>
      </div>
      <div class="qrfy-mini" id="qrfyMenuInfo" style="margin-bottom:10px;"></div>

      <div class="qrfy-row">
        <button class="qrfy-btn" id="qrfyBase" style="background:${COLORS.BASE.fill}">BASE</button>
        <button class="qrfy-btn" id="qrfyPot"  style="background:${COLORS.POTENCIAL.fill}">POTENCIAL</button>
        <button class="qrfy-btn" id="qrfyNeu"  style="background:${COLORS.NEUTRO.fill}">NEUTRO</button>
        <button class="qrfy-btn" id="qrfyRuim" style="background:${COLORS.RUIM.fill}">RUIM</button>
      </div>

      <div class="qrfy-row" style="margin-bottom:0;">
        <button class="qrfy-btn" id="qrfyRem" style="background:rgba(255,255,255,.14)">Remover</button>
        <button class="qrfy-btn" id="qrfyClose" style="background:rgba(255,255,255,.14)">Fechar</button>
      </div>

      <div class="qrfy-mini" id="qrfyHint" style="margin-top:10px;"></div>
    `;
    document.body.appendChild(menu);
    return menu;
  }

  let currentId=null;
  let currentLayer=null;

  function hideMenu(){
    const menu=ensureMenu();
    menu.style.display="none";
    currentId=null;
    currentLayer=null;
  }

  function showMenuAt(x,y,fid,props){
    const menu=ensureMenu();
    currentId=fid;

    const title=document.getElementById("qrfyMenuId");
    if(title) title.innerText=fid || "";

    const info=document.getElementById("qrfyMenuInfo");
    const bairro = (props && props._bairro) ? props._bairro : "";
    const mun = (props && props._mun) ? props._mun : "";
    const lines=[];
    if(bairro && bairro !== "nan" && bairro !== "None") lines.push("Bairro: <span class='qrfy-b'>"+bairro+"</span>");
    if(mun) lines.push("Município: <span class='qrfy-b'>"+mun+"</span>");
    if(info) info.innerHTML = lines.length ? lines.join("<br>") : "&nbsp;";

    const hint=document.getElementById("qrfyHint");
    const st=loadState();
    const cur=(fid && st[fid]) ? st[fid] : "—";
    if(hint) hint.innerHTML="Atual: <span class='qrfy-b'>"+cur+"</span>";

    menu.style.left=(x+10)+"px";
    menu.style.top=(y+10)+"px";
    menu.style.display="block";
  }

  function bindMenuActions(){
    ensureMenu();

    const bBase=document.getElementById("qrfyBase");
    const bPot=document.getElementById("qrfyPot");
    const bNeu=document.getElementById("qrfyNeu");
    const bRuim=document.getElementById("qrfyRuim");
    const bRem=document.getElementById("qrfyRem");
    const bClose=document.getElementById("qrfyClose");

    function setLbl(lbl){
      if(!currentId) return;
      const st=loadState();
      st[String(currentId)]=lbl;
      saveState(st);
      if(currentLayer) currentLayer.setStyle(styleForLabel(lbl));
      hideMenu();
    }
    function unsetLbl(){
      if(!currentId) return;
      const st=loadState();
      delete st[String(currentId)];
      saveState(st);
      if(currentLayer) currentLayer.setStyle(styleForLabel("NONE"));
      hideMenu();
    }

    if(bBase) bBase.onclick = ()=>setLbl("BASE");
    if(bPot)  bPot.onclick  = ()=>setLbl("POTENCIAL");
    if(bNeu)  bNeu.onclick  = ()=>setLbl("NEUTRO");
    if(bRuim) bRuim.onclick = ()=>setLbl("RUIM");
    if(bRem)  bRem.onclick  = ()=>unsetLbl();
    if(bClose) bClose.onclick = ()=>hideMenu();

    document.addEventListener("click",(ev)=>{
      const menu=document.getElementById("qrfyMenu");
      if(!menu || menu.style.display!=="block") return;
      if(!menu.contains(ev.target)) hideMenu();
    });
  }

  function applyAll(GEO){
    const st=loadState();
    GEO.eachLayer((layer)=>{
      try{
        const props=(layer.feature && layer.feature.properties) ? layer.feature.properties : {};
        const fid = props && props._qid ? String(props._qid) : null;
        const lbl=(fid && st[fid]) ? st[fid] : "NONE";
        layer.setStyle(styleForLabel(lbl));
      }catch(e){}
    });
  }

  function hook(GEO){
    bindMenuActions();

    GEO.eachLayer((layer)=>{
      try{
        if(layer.options){
          layer.options.interactive = true;
          layer.options.bubblingMouseEvents = true;
        }
      }catch(e){}

      layer.on("click",(e)=>{
        try{
          const props=(layer.feature && layer.feature.properties) ? layer.feature.properties : {};
          const fid = props && props._qid ? String(props._qid) : null;
          if(!fid) return;

          // flash amarelo (confirma clique)
          try{
            layer.setStyle({color:"#ffd400", weight:3.2});
            setTimeout(()=>{
              const st=loadState();
              const lbl=(fid && st[fid]) ? st[fid] : "NONE";
              layer.setStyle(styleForLabel(lbl));
            }, 200);
          }catch(_e){}

          currentLayer = layer;
          const evt=e.originalEvent;
          showMenuAt(evt.clientX, evt.clientY, fid, props);
        }catch(err){}
      });

      layer.on("mouseover",()=>{ try{ layer.setStyle({weight:2.4,fillOpacity:.86}); }catch(e){} });
      layer.on("mouseout",()=>{
        try{
          const st=loadState();
          const props=(layer.feature && layer.feature.properties) ? layer.feature.properties : {};
          const fid = props && props._qid ? String(props._qid) : null;
          const lbl=(fid && st[fid]) ? st[fid] : "NONE";
          layer.setStyle(styleForLabel(lbl));
        }catch(e){}
      });
    });

    applyAll(GEO);
  }

  // BOOT robusto (3 níveis)
  function boot(){
    // 1) tenta pelo nome do geo
    let GEO = getByEval(GEO_NAME);
    if(GEO){ hook(GEO); return; }

    // 2) tenta pelo mapa e varre layers
    const MAP = getByEval(MAP_NAME);
    if(MAP){
      GEO = findGeoJsonFromMap(MAP);
      if(GEO){ hook(GEO); return; }
    }

    // 3) acha qualquer mapa+geo
    const any = findAnyMapAndGeo();
    if(any.geo){ hook(any.geo); return; }

    setTimeout(boot, 250);
  }

  boot();
})();
</script>
