
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório São José Dos Campos | Quadrify</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0: #060913;
      --bg1: #0b1022;
      --card: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.10);
      --text: #e5e7eb;
      --muted: #a7b0c0;
      --primary: #3b82f6;
      --accent: #38bdf8;
      --shadow: 0 14px 40px rgba(0,0,0,0.45);
      --glow: 0 0 0 2px rgba(56,189,248,0.70), 0 18px 40px rgba(0,0,0,0.55);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 10% 0%, rgba(56,189,248,0.18), transparent 55%),
        radial-gradient(1100px 500px at 90% 10%, rgba(59,130,246,0.16), transparent 50%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--text);
      padding: 26px 14px;
    }
    .page {
      max-width: 1180px;
      margin: 18px auto 34px auto;
      padding: 28px 30px 56px 30px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 22px;
      backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    /* ===== CAPA (igual ao segundo print) ===== */
    .coverHeader {
      text-align: center;
      padding: 8px 2px 18px 2px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 18px;
    }
    .coverKicker {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 14px;
      text-align: left;
    }
    .coverTitle {
      margin: 0;
      font-size: 40px;
      line-height: 1.05;
      color: var(--accent);
      font-weight: 800;
    }
    .coverSub {
      margin-top: 12px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 600;
    }

    /* Imagens nos cantos inferiores (sem nada no meio) */
    .coverStage {
      position: relative;
      min-height: 360px;
      margin-top: 6px;
      margin-bottom: 10px;
    }
    .coverImg {
      position: absolute;
      bottom: 0;
      width: 260px;
      height: 260px;
      object-fit: cover;
      border-radius: 18px;
      border: 2px solid rgba(56,189,248,0.75);
      box-shadow: var(--glow);
      background: rgba(255,255,255,0.03);
      z-index: 2; /* <<< opcional: evita sobreposição estranha */
    }
    .coverImg.left { left: 6%; }
    .coverImg.right { right: 6%; }

    /* Dados básicos */
    .card {
      position: relative;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.35);
      margin-top: 14px;
      overflow: hidden;
    }
    .card.accent {
      background: linear-gradient(180deg, rgba(59,130,246,0.16), rgba(255,255,255,0.04));
      border-color: rgba(59,130,246,0.28);
    }
    .cardBody { padding: 18px 18px; }
    .cardTitle {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(229,231,235,0.85);
      margin-bottom: 10px;
    }

    .basicGrid {
      margin-top: 6px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px 14px;
    }
    .basicGrid .span2 { grid-column: span 2; }
    .kv {
      padding: 12px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
    }
    .kv .k {
      font-size: 12px;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: rgba(167,176,192,0.95);
      margin-bottom: 6px;
    }
    .kv .v {
      font-size: 15px;
      color: rgba(229,231,235,0.95);
      font-weight: 600;
      word-break: break-word;
    }

    /* Páginas de mapa */
    .pageHeaderMap {
      text-align: left;
      padding: 4px 2px 12px 2px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 12px;
    }
    .pageKicker {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .pageTitleMap {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      color: var(--accent);
    }
    .pageSubtitleMap {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.4;
    }

    .mapFrame {
      width: 100%;
      height: 560px;
      border: 0;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }
    .mapActions {
      text-align: center;
      margin-top: 14px;
    }
    .btn {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(59,130,246,1), rgba(37,99,235,1));
      color: white;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(37,99,235,0.28);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .opLine {
      margin: 0 0 10px 0;
      font-size: 16px;
      line-height: 1.6;
      color: rgba(229,231,235,0.94);
    }
    .opExplain {
      margin: 0;
      color: rgba(229,231,235,0.88);
      line-height: 1.65;
      font-size: 15.5px;
    }

    /* Tabela coordenadas */
    .coordTable {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.03);
    }
    .coordTable thead th {
      background: rgba(255,255,255,0.92);
      color: #111827;
      padding: 14px 14px;
      font-size: 14px;
      text-align: left;
      border-bottom: 1px solid rgba(0,0,0,0.10);
    }
    .coordTable tbody td {
      padding: 14px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      vertical-align: top;
    }
    .coordTable tbody tr:last-child td { border-bottom: 0; }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13.5px;
      line-height: 1.6;
      color: rgba(229,231,235,0.92);
      word-break: break-word;
    }
    .badgeCell { text-align: center; width: 16%; }
    .badge {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.16);
    }
    .badge.ideal {
      background: rgba(34,197,94,0.18);
      color: rgba(187,247,208,0.95);
      border-color: rgba(34,197,94,0.35);
    }
    .badge.sub {
      background: rgba(59,130,246,0.18);
      color: rgba(191,219,254,0.95);
      border-color: rgba(59,130,246,0.35);
    }

    /* <<< FIX: responsivo sem colar as imagens uma em cima da outra */
    @media (max-width: 980px) {
      .page { padding: 20px 16px 52px 16px; }
      .coverTitle { font-size: 30px; }
      .coverStage { min-height: 320px; }

      .coverImg { width: 210px; height: 210px; }

      .coverImg.left  { left: 4% !important;  right: auto !important; }
      .coverImg.right { right: 4% !important; left: auto !important; }

      .basicGrid { grid-template-columns: 1fr; }
      .basicGrid .span2 { grid-column: auto; }
      .mapFrame { height: 520px; }
    }
  </style>
</head>
